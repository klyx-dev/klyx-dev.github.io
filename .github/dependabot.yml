version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 10

    labels:
      - dependencies

    commit-message:
      prefix: "deps"

    groups:
      frontend:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"

    labels:
      - dependencies

    commit-message:
      prefix: "ci"

    groups:
      github-actions:
        patterns:
          - "*"
